<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in…</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #555;
      padding: 24px; box-sizing: border-box;
    }
    .box { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 18px; margin: 0; color: #111; }
    p { font-size: 13px; margin: 0; color: #666; }
    label { font-size: 12px; color: #888; }
    textarea {
      width: 100%; box-sizing: border-box; font-family: ui-monospace, Menlo, monospace;
      font-size: 12px; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
      background: #f7f7f7; resize: none; word-break: break-all;
    }
    button {
      padding: 12px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; background: #111; color: #fff;
    }
    button.secondary { background: #eee; color: #111; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Almost there</h1>
    <p>Tap the button below to return to the app and finish signing in.</p>

    <label>Deep link (debug)</label>
    <textarea id="deeplink" rows="3" readonly></textarea>

    <label>Current URL (debug)</label>
    <textarea id="currenturl" rows="3" readonly></textarea>

    <button id="continue">Continue to app</button>
    <div class="row">
      <button class="secondary" id="copyDeeplink">Copy deep link</button>
      <button class="secondary" id="copyUrl">Copy URL</button>
    </div>
  </div>

  <script>
    (function () {
      var hash = new URLSearchParams(window.location.hash.substring(1));
      var query = new URLSearchParams(window.location.search);

      var token = hash.get('access_token') || query.get('access_token');
      var error = hash.get('error') || query.get('error');
      var scheme = hash.get('state') || query.get('state') || 'myapp'; // deeplink scheme

      var payload = token ? ('access_token=' + encodeURIComponent(token))
                          : ('error=' + encodeURIComponent(error || 'no_token'));
      var deeplink = scheme + '://auth?' + payload;

      document.getElementById('deeplink').value = deeplink;
      document.getElementById('currenturl').value = window.location.href;

      // Redirect ONLY on button click.
      document.getElementById('continue').addEventListener('click', function () {
        var a = document.createElement('a');
        a.href = deeplink;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function () { window.location.href = deeplink; }, 150);
      });

      document.getElementById('copyDeeplink').addEventListener('click', function () {
        if (navigator.clipboard) navigator.clipboard.writeText(deeplink);
      });
      document.getElementById('copyUrl').addEventListener('click', function () {
        if (navigator.clipboard) navigator.clipboard.writeText(window.location.href);
      });
    })();
  </script>
</body>
</html>
