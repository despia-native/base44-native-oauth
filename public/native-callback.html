<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Completing sign in...</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
           background: #fff; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <p>Completing sign in...</p>
  <script>
    (function () {
      // OAuth providers (Google implicit flow, Apple fragment mode) return tokens
      // in the URL hash. The deeplink scheme travels via `state`.
      var query = new URLSearchParams(window.location.search)
      var hash = new URLSearchParams(window.location.hash.substring(1))

      var scheme = hash.get('state') || query.get('state') || query.get('deeplink_scheme')
      if (!scheme) { document.body.textContent = 'Missing deeplink scheme.'; return }

      var accessToken = hash.get('access_token') // Google
      var idToken = hash.get('id_token')         // Apple
      var error = hash.get('error') || query.get('error')

      // The oauth/ prefix is required — it tells Despia to close the tab and
      // navigate the WebView to /auth with these params.
      if (accessToken) {
        window.location.href = scheme + '://oauth/auth?access_token=' + encodeURIComponent(accessToken)
      } else if (idToken) {
        window.location.href = scheme + '://oauth/auth?id_token=' + encodeURIComponent(idToken)
      } else {
        window.location.href = scheme + '://oauth/auth?error=' + encodeURIComponent(error || 'no_token')
      }
    })()
  </script>
</body>
</html>
